name: Sync Friendly Match Results

on:
  schedule:
    - cron: '0 7 * * *'   # chaque jour à 7h UTC
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync friendly matches
        run: node scripts/sync-friendlies.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/_data.js
          if git diff --staged --quiet; then
            echo "Aucun nouveau résultat."
          else
            git commit -m "auto: sync friendlies $(date +%Y-%m-%d)"
            git push
          fi
