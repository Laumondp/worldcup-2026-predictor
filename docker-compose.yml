version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wc2026-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/worldcup.db
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - FOOTBALL_DATA_ORG_KEY=${FOOTBALL_DATA_ORG_KEY:-}
      - DEBUG=false
    volumes:
      - backend_data:/app/data
      - backend_models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wc2026-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_models:
